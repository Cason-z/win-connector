name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, e.g. v1.0.0'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: vars
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            "tag=${{ inputs.tag }}" >> $env:GITHUB_OUTPUT
          } else {
            "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build Windows GUI package
        shell: pwsh
        run: |
          .\scripts\build_windows.ps1
          if (-not (Test-Path .\dist\WinConnector.exe)) {
            throw 'Expected dist\\WinConnector.exe to exist after PyInstaller build.'
          }
          Compress-Archive -Path .\dist\WinConnector.exe -DestinationPath .\dist\WinConnector-${{ steps.vars.outputs.tag }}-windows-x86_64.zip -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/WinConnector-${{ steps.vars.outputs.tag }}-windows-x86_64.zip
